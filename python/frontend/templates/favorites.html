<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineLogic - Mis Favoritos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css?v=19" rel="stylesheet">
  <link rel="shortcut icon" href="../static/logo.png" type="image/x-icon">
  <style>
    .fav-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(15,12,41,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-glass); }
    .fav-header h1 { font-size: 1.4rem; color: var(--gold); margin: 0; }
    .fav-header a { text-decoration: none; }
    .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; padding: 1.5rem; }
    .fav-card { display: flex; gap: 12px; align-items: flex-start; padding: 14px; background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 14px; transition: all 0.3s; position: relative; }
    .fav-card:hover { background: var(--bg-card-hover); }
    .fav-card img { width: 80px; height: 120px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .fav-card-body { flex: 1; min-width: 0; }
    .fav-card-body strong { color: var(--gold); font-size: 1rem; }
    .fav-card-body .year { color: var(--text-muted); font-size: 0.85rem; }
    .fav-card-body .overview { color: var(--text-muted); font-size: 0.82rem; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .fav-remove { position: absolute; top: 8px; right: 10px; cursor: pointer; font-size: 1.3rem; color: var(--accent); user-select: none; }
    .fav-remove:hover { transform: scale(1.2); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-state .big-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="fav-header">
    <div class="nav-group">
      <a href="/chat">← Chat</a>
      <span class="nav-sep">|</span>
      <a href="/">Cartelera</a>
      <span class="nav-sep">|</span>
      <a href="/logout">Cerrar sesión</a>
    </div>
    <h1>♥ Mis Favoritos</h1>
  </div>

  <div id="favoritesContainer">
    <div class="empty-state" id="loadingState">

      <p>Cargando favoritos...</p>
    </div>
  </div>

  <script src="/static/js/movie-overlay.js?v=3"></script>
  <script>
    async function loadFavorites() {
      const container = document.getElementById('favoritesContainer');
      try {
        const res = await fetch('/api/favorites');
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        const ids = data.favorite_ids;
        if (ids.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="big-icon">♡</div><p>No tienes películas favoritas aún.</p><p>Chatea con CineLogic y añade películas desde las recomendaciones.</p><a href="/chat" class="btn btn-cine" style="text-decoration:none;display:inline-block;margin-top:1rem">Ir al Chat</a></div>';
          return;
        }

        const detailsRes = await fetch('/api/favorites/details', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ids}) });
        const details = await detailsRes.json();

        let html = '<div style="text-align:center;padding:0 1.5rem"><button class="btn btn-cine" onclick="showRecommendOverlay()">Recomiéndame basado en mis favoritos</button></div>';
        html += '<div class="fav-grid">';
        for (const m of details.movies) {
          const title = m.title || 'Sin título';
          const year = m.release_date ? String(m.release_date).slice(0,4) : '';
          const overview = m.overview || '';
          const poster = m.poster_url || '';
          const img = poster ? `<img src="${poster}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : '';
          html += `<div class="fav-card" data-id="${m.id}">
            ${img}
            <div class="fav-card-body">
              <strong>${title}</strong>${year ? ` <span class="year">(${year})</span>` : ''}
              <div class="overview">${overview}</div>
              <a href="#" class="btn-detail" data-movie-id="${m.id}">▶ Ver detalle</a>
            </div>
            <span class="fav-remove" onclick="removeFavorite(${m.id})">❤️</span>
          </div>`;
        }
        html += '</div>';
        container.innerHTML = html;
      } catch(e) {
        container.innerHTML = '<div class="empty-state"><p>Error al cargar favoritos.</p></div>';
      }
    }

    async function removeFavorite(movieId) {
      await fetch('/api/favorites/' + movieId, { method: 'DELETE' });
      const card = document.querySelector(`.fav-card[data-id="${movieId}"]`);
      if (card) card.remove();
      const remaining = document.querySelectorAll('.fav-card');
      if (remaining.length === 0) {
        document.getElementById('favoritesContainer').innerHTML = '<div class="empty-state"><div class="big-icon">♡</div><p>No tienes películas favoritas aún.</p><a href="/chat" class="btn btn-cine" style="text-decoration:none;display:inline-block;margin-top:1rem">Ir al Chat</a></div>';
      }
    }

    let recOffset = 0;

    function showRecommendOverlay() {
      recOffset = 0;
      document.getElementById('recommendOverlay').style.display = 'block';
      loadRecommendPage();
    }

    async function loadRecommendPage() {
      const content = document.getElementById('recommendOverlayContent');
      const oldBtn = content.querySelector('.rec-more-btn');
      if (recOffset === 0) {
        content.innerHTML = '<p class="detail-loading">Cargando...</p>';
      } else if (oldBtn) {
        oldBtn.textContent = 'Cargando...';
        oldBtn.disabled = true;
      }
      try {
        const res = await fetch('/api/favorites/recommend?offset=' + recOffset);
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        if (recOffset === 0) {
          content.innerHTML = data.html || '<p class="text-muted">Sin resultados.</p>';
        } else {
          if (oldBtn) oldBtn.remove();
          content.insertAdjacentHTML('beforeend', data.html || '');
        }
        recOffset += 5;
        const btn = document.createElement('button');
        btn.className = 'btn btn-cine rec-more-btn';
        btn.style.cssText = 'width:100%;margin-top:1rem;margin-left:0;padding:1rem;font-size:1.1rem;border-radius:12px';
        btn.textContent = data.has_more ? 'Mostrar 5 más →' : 'No hay más resultados';
        btn.disabled = !data.has_more;
        if (data.has_more) btn.onclick = loadRecommendPage;
        content.appendChild(btn);
      } catch(e) {
        content.innerHTML = '<p class="text-muted">Error al obtener recomendaciones.</p>';
      }
    }

    function closeRecommendOverlay() {
      document.getElementById('recommendOverlay').style.display = 'none';
    }

    loadFavorites();

    function onDetailClick(e) {
      const btn = e.target.closest('.btn-detail');
      if (btn) {
        e.preventDefault();
        const movieId = btn.dataset.movieId || btn.getAttribute('href').split('/').pop();
        showMovieDetail(parseInt(movieId));
      }
    }

  </script>

  <div id="recommendOverlay" class="movie-overlay" style="display:none">
    <div class="overlay-header">
      <button onclick="closeRecommendOverlay()" class="btn-back-overlay">← Volver a favoritos</button>
    </div>
    <div id="recommendOverlayContent" class="overlay-content"></div>
  </div>

  <div id="movieOverlay" class="movie-overlay" style="display:none">
    <div class="overlay-header">
      <button onclick="closeMovieOverlay()" class="btn-back-overlay">← Volver a favoritos</button>
    </div>
    <div id="overlayContent" class="overlay-content"></div>
  </div>

  <script>
    document.getElementById('favoritesContainer').addEventListener('click', onDetailClick);
    document.getElementById('recommendOverlay').addEventListener('click', onDetailClick);

    document.getElementById('recommendOverlay').addEventListener('click', async (e) => {
      const heart = e.target.closest('.fav-heart');
      if (!heart) return;
      const movieId = parseInt(heart.dataset.id);
      const isFav = heart.textContent === '❤️';
      try {
        if (isFav) {
          await fetch('/api/favorites/' + movieId, { method: 'DELETE' });
          heart.textContent = '♡';
        } else {
          await fetch('/api/favorites/' + movieId, { method: 'POST' });
          heart.textContent = '❤️';
        }
        loadFavorites();
      } catch(e) {}
    });
  </script>
</body>
</html>
