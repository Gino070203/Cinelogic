<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineLogic - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css?v=17" rel="stylesheet">
  <style>
    .auth-form { min-width: 440px; margin: 4rem auto; padding: 2rem; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-glass); }
    .auth-form h2 { text-align: center; margin-bottom: 1.5rem; color: var(--gold); }
    .auth-form .form-control { background: rgba(255,255,255,0.06); border: 1px solid var(--border-glass); color: var(--text-light); }
    .auth-form .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(233,69,96,0.2); }
    .auth-form .btn-cine { width: 100%; }
    .auth-form .btn-cine:hover { transform: none; box-shadow: 0 4px 15px rgba(233,69,96,0.3); background: linear-gradient(135deg, var(--accent), #c0392b); }
    .auth-form p { text-align: center; margin-top: 1rem; color: var(--text-muted); }
    .auth-form a { color: var(--accent); text-decoration: none; }
    .error { color: var(--accent); text-align: center; margin-bottom: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container d-flex align-items-center" style="min-height:100vh">
    <div class="auth-form">
      <h2>Iniciar Sesión</h2>
      <p class="error"></p>
      <form method="post" action="/login">
        <div class="mb-3">
          <input type="text" name="username" class="form-control" placeholder="Correo electrónico" required autofocus>
        </div>
        <div class="mb-3">
          <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn btn-cine">Entrar</button>
      </form>
      <p>¿No tienes cuenta? <a href="/register">Regístrate</a></p>
      <p><a href="/">← Volver a la cartelera</a></p>
    </div>
  </div>
</body>
</html>
