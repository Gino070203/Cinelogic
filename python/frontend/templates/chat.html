<!DOCTYPE html>
<html lang="es">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineLogic - Asistente de Recomendación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css?v=19" rel="stylesheet">
  <link rel="shortcut icon" href="../static/logo.png" type="image/x-icon">

</head>

<body>

  <div class="container-fluid vh-100 d-flex flex-column p-0">

    <header class="cine-header text-center py-3 position-relative">
      <div class="header-nav">
        <div class="nav-group">
          <a href="/">← Cartelera</a>
          <span class="nav-sep">|</span>
          <a href="/favorites">♥ Favoritos</a>
          <span class="nav-sep">|</span>
          <a href="/logout" id="btnLogout" style="display:none">Cerrar sesión</a>
        </div>
      </div>
      <h1 class="mb-0"><img src="../static/logo.png" alt="CineLogic" height="130px" width="130px"></h1>
      <p class="mb-0">Asistente Inteligente de Recomendación Cinematográfica</p>
    </header>

    <main class="chat-container flex-grow-1 overflow-auto p-3" id="chatContainer">
      <div class="message bot-message">
        <div class="bubble">
          ¡Bienvenido a CineLogic! 🎥 Soy tu crítico de cine personal.
          Cuéntame qué tipo de película buscas y te recomendaré verdaderas joyas.
          <br><br>
          <small >Ej: "Quiero una película de ciencia ficción de los 2000s"</small>
        </div>
      </div>
    </main>

    <footer class="cine-footer p-3">

      <div id="chat-input-wrapper">
        <form id="chatForm" class="input-group">
          <input type="text" id="messageInput" class="form-control" placeholder="Escribe tu mensaje..." autofocus>
          <button type="submit" class="btn btn-cine">Enviar</button>
        </form>
      </div>

    </footer>

  </div>


  <script src="/static/js/movie-overlay.js?v=3"></script>
  <script src="/static/js/chat.js?v=7"></script>

  <div id="movieOverlay" class="movie-overlay" style="display:none">
    <div class="overlay-header">
      <button onclick="closeMovieOverlay()" class="btn-back-overlay">← Volver al chat</button>
    </div>
    <div id="overlayContent" class="overlay-content"></div>
  </div>
</body>

</html>
